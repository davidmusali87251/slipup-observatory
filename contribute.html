<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>A Moment — SlipUp Observatory</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="./favicon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css?v={{BUILD_ID}}" />
  </head>
  <body>
    <main class="page contribute-page">
      <header class="topbar">
        <a class="text-link back-link" href="./index.html">
          <span class="back-link-full">Back to Observatory</span>
          <span class="back-link-short">Back</span>
        </a>
        <h1>A Moment</h1>
      </header>

      <section class="panel panel-contribute" aria-label="Contribute a moment — Atmosphere rise" data-layer="atmosphere-rise">
        <div class="contribute-layer-entry" aria-hidden="true">
          <p class="contribute-layer-eyebrow">To the atmosphere</p>
        </div>
        <p class="contribute-layer-hint" aria-hidden="true">Where your moment enters the reading.</p>
        <form id="contributeForm" class="contribute-rise-form" novalidate>
          <label class="field">
            <span>Type</span>
            <select id="typeInput" name="type" required>
              <option value="fertile">Fertile moment</option>
              <option value="avoidable">Avoidable moment</option>
              <option value="observed">Observed moment</option>
            </select>
          </label>

          <label class="field">
            <span>Mood</span>
            <select id="moodInput" name="mood" required>
              <option value="calm">Calm</option>
              <option value="focus">Focus</option>
              <option value="stressed">Stressed</option>
              <option value="curious">Curious</option>
              <option value="tired">Tired</option>
            </select>
          </label>

          <label class="field">
            <span>Huella</span>
            <input
              id="noteInput"
              name="note"
              type="text"
              maxlength="19"
              placeholder="What rises from this moment?"
              required
            />
            <small class="field-hint" aria-hidden="true">max 19</small>
            <p id="noteAnalysisLine" class="note-analysis-line" aria-live="polite" aria-label="How this field is read by the observatory"></p>
          </label>

          <label class="field field-inline" for="sharedInput">
            <input id="sharedInput" name="shared" type="checkbox" checked />
            <span>Share this moment (shared field)</span>
          </label>
          <p class="contribute-trust-note">No account. No exact pin. Sharing off keeps this moment on your device.</p>
          <label class="field field-inline" for="consentInput">
            <input id="consentInput" name="consent" type="checkbox" required />
            <span>I accept Privacy and Terms, including coarse regional bucket use for shared moments.</span>
          </label>
          <p class="legal-links">
            <a class="text-link" href="./privacy.html">Privacy</a>
            <span aria-hidden="true">·</span>
            <a class="text-link" href="./terms.html">Terms</a>
            <span aria-hidden="true">·</span>
            <a class="text-link support-observatory-link" href="https://paypal.me/slipupobservatory" target="_blank" rel="noopener noreferrer">Support the Observatory</a>
          </p>

          <button id="saveButton" class="cta" type="submit">Contribute</button>
          <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="./contribute.js?v={{BUILD_ID}}" type="module"></script>
  </body>
</html>
