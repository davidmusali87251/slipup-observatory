# Despliega el sitio estático a GitHub Pages.
# Genera remote.js con secrets antes del deploy para que producción use el backend real.
# En el repo: Settings → Secrets and variables → Actions → añadir:
#   REMOTE_MOMENTS_URL, REMOTE_CLIMATE_URL, REMOTE_ANON_KEY, USE_REMOTE_SHARED

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate remote.js
        env:
          REMOTE_MOMENTS_URL: ${{ secrets.REMOTE_MOMENTS_URL }}
          REMOTE_CLIMATE_URL: ${{ secrets.REMOTE_CLIMATE_URL }}
          REMOTE_ANON_KEY: ${{ secrets.REMOTE_ANON_KEY }}
          USE_REMOTE_SHARED: ${{ secrets.USE_REMOTE_SHARED }}
        run: node scripts/generate-remote.js

      - name: Prepare site
        run: |
          set -e
          mkdir -p _site
          cp index.html contribute.html terms.html privacy.html ai.html _site/
          cp app.js contribute.js remote.js modelConstants.js styles.css _site/
          cp favicon.svg CNAME _site/ 2>/dev/null || true
          BUILD_ID="${{ github.sha }}"
          for f in _site/*.html; do
            sed -i "s|{{BUILD_ID}}|${BUILD_ID}|g" "$f"
          done
          echo "Build ID substituted in $(ls _site/*.html | wc -l) HTML files"

      - name: Check remote.js has real URLs when secrets are set
        env:
          REMOTE_MOMENTS_URL: ${{ secrets.REMOTE_MOMENTS_URL }}
        run: |
          if [ -n "$REMOTE_MOMENTS_URL" ]; then
            if grep -q "YOUR_PROJECT_REF" _site/remote.js; then
              echo "::error::remote.js still contains placeholder YOUR_PROJECT_REF. Check secrets and generate-remote.js."
              exit 1
            fi
          fi

      - name: Verify _site before upload
        run: |
          ls -la _site/
          test -f _site/index.html && test -f _site/app.js && echo "Artifacts OK"

      - name: Smoke test (backend reachable)
        env:
          REMOTE_CLIMATE_URL: ${{ secrets.REMOTE_CLIMATE_URL }}
          REMOTE_ANON_KEY: ${{ secrets.REMOTE_ANON_KEY }}
        run: |
          if [ -z "$REMOTE_CLIMATE_URL" ] || [ -z "$REMOTE_ANON_KEY" ]; then
            echo "Skipping smoke test (secrets not set)."
            exit 0
          fi
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "apikey: $REMOTE_ANON_KEY" \
            -H "Authorization: Bearer $REMOTE_ANON_KEY" \
            "$REMOTE_CLIMATE_URL?windowHours=48")
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Smoke test: climate GET returned $STATUS (expected 200). Check backend and CORS."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
